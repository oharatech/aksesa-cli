[project]
name = "aksesa"
version = "1.44.6"
description = "Aksesa is a CLI agent that lives in your terminal."
readme = "README.md"
requires-python = ">=3.12"
dependencies = ["aksesa-cli==1.44.6"]

[project.scripts]
aksesa = "aksesa_cli.__main__:main"

[build-system]
requires = ["uv_build>=0.8.5,<0.10.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = ["aksesa"]
